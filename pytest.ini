[pytest]
# Pytest configuration for us-z-3 pipeline tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=pipeline
    --cov-report=term-missing

# Test markers
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    unit: marks tests as unit tests (fast, no IO)
    integration: marks tests as integration tests (uses test DB)
    e2e: marks tests as end-to-end tests (full pipeline)
    slow: marks tests as slow running
    requires_network: marks tests that require network access (should use mocks instead)

# Asyncio mode
asyncio_mode = auto

# Test paths
testpaths = tests

# Minimum Python version
minversion = 3.10

