name: Build and push pipeline image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
  schedule:
    # Weekly rebuild so the image picks up python:3.12-slim's upstream security
    # patches even when nothing in this repo changes for a while — otherwise a
    # fixed base-image CVE only reaches the shipped image on the next code push.
    - cron: '0 6 * * 1'

# Queue, don't cancel: a cancelled docker push mid-flight is best avoided even
# though registries handle partial pushes reasonably well.
concurrency:
  group: build-${{ github.workflow }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      security-events: write  # upload Trivy's SARIF results to the Security tab

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: pip install -r requirements.lock

      - name: Test and type-check
        run: make check

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          TAGS="ghcr.io/${{ env.OWNER }}/us-z-3:latest,ghcr.io/${{ env.OWNER }}/us-z-3:${{ github.sha }}"
          # Secondary/low-priority path: rsync-to-VPS is the real deploy target, but
          # tag the image to match a release anyway in case the Kestra path is used.
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAGS="$TAGS,ghcr.io/${{ env.OWNER }}/us-z-3:${{ github.ref_name }}"
          fi
          echo "list=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for known CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/us-z-3:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # advisory — never fails the build, see .claude/rules/git.md

      - name: Upload scan results to the Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
