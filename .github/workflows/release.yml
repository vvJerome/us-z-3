name: Release

# Manual, deliberate release — never fires automatically on merge. A release marks a
# benchmarking checkpoint (see CLAUDE.md "Versioning"), not a publish event; nothing
# else in this repo depends on it existing. Trigger with:
#   gh workflow run release.yml -f bump=minor
# or via the Actions tab / the /release slash command.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version part to bump"
        required: true
        type: choice
        options: [major, minor, patch]
        default: patch

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for `git describe`

      - name: Compute next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [[ -z "$LATEST" ]]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag: $LATEST"

          VERSION="${LATEST#v}"
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          PATCH="${REST#*.}"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" \
            -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes
