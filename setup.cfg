[flake8]
max-line-length = 120
extend-ignore =
    E221,
    W503,
    E501
per-file-ignores =
    pipeline/ops/*.py: E402
exclude =
    .venv,
    __pycache__,
    .git,
    output,
    runs,
    input

[mypy]
ignore_missing_imports = True
no_strict_optional = True
no_error_summary = True
exclude = (\.venv|output|runs|input)

[mypy-pipeline.ops.*]
ignore_errors = True
